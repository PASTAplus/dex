# Ruff

[tool.ruff]
line-length = 100
ignore = [
    "E402", # module level import not at top of file
    "F541", # f-string is missing placeholders
]

# Black

[tool.black]
skip-string-normalization = true
line-length = 100

# pytest

[tool.pytest.ini_options]
# We add this so that pytest imports use the same import paths as the rest of the code. Without
# this, we will for example get multiple SQLAlchemy table registration bases, one under each import
# path.
pythonpath = ["dex"]
filterwarnings = [
    # Treat all warnings as errors.
    "error",
    # Ignore specific warnings.
    "ignore::DeprecationWarning",
    "ignore::sqlalchemy.exc.SAWarning",
    "ignore:function ham\\(\\) is deprecated:DeprecationWarning"]

asyncio_default_fixture_loop_scope = "session"

addopts = [
    # "-p no:warnings"
    '--capture=no',
]


[tool.pixi.workspace]
name = "dex"
channels = ["conda-forge"]
platforms = ["linux-64", "linux-aarch64"]

[tool.pixi.dependencies]
python = "3.12.*"
pip = ">=26.0.1,<27"
# Web framework
flask = ">=3.1.3,<4"
gunicorn = ">=25.2.0,<26"
jinja2 = ">=3.1.6,<4"
# Utilities
bokeh = ">=3.9.0,<4"
chardet = ">=5.2.0,<6"
cython = ">=3.2.4,<4"
fasteners = ">=0.19,<0.20"
lxml = ">=6.0.2,<7"
matplotlib = ">=3.9.4,<4"
msgpack-python = ">=1.1.2,<2"
numexpr = ">=2.14.1,<3"
pandas = ">=2.3.3,<3"
py-cpuinfo = ">=9.0.0,<10"
pydantic = ">=2.12.5,<3"
pygments = ">=2.19.2,<3"
regex = ">=2026.2.28,<2027"
requests = ">=2.33.0,<3"
setuptools = "==80.10.2"
ydata-profiling = ">=4.16.0,<5"
# Testing
pytest = ">=9.0.2,<10"

[tool.pixi.tasks]
freeze = "pip list --format freeze > requirements.txt"
